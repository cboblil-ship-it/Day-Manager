<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<title>המשימות שלי</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  -webkit-text-size-adjust: 100%;
  text-size-adjust: 100%;
  overscroll-behavior: none;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --app-bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e; --surface3: #2a2a38;
  --accent: #7c6af7; --accent2: #a78bfa; --accent-glow: rgba(124,106,247,0.2);
  --success: #34d399; --warning: #fbbf24; --danger: #f87171;
  --text1: #f0eeff; --text2: #9490b8; --text3: #5c5878;
  --border: rgba(255,255,255,0.08);
  --r: 18px; --rs: 12px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
body {
  font-family: 'Rubik', sans-serif;
  background: var(--app-bg);
  color: var(--text1);
  direction: rtl;
  min-height: 100vh;
  overflow-x: hidden;
}
.app {
  width: 100%;
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top);
}
.header {
  padding: 20px 18px 8px;
  position: sticky; top: 0;
  background: var(--app-bg);
  z-index: 10;
}
.header-top {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.greeting { font-size: 24px; font-weight: 700; line-height: 1.2; }
.sub { font-size: 14px; color: var(--text2); margin-top: 3px; }
.header-actions { display: flex; gap: 10px; align-items: center; }
.date-pill {
  font-size: 13px; color: var(--text2);
  background: var(--surface); padding: 7px 14px;
  border-radius: 20px; border: 0.5px solid var(--border);
}
.icon-btn {
  width: 46px; height: 46px; border-radius: 50%;
  background: var(--surface); border: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; position: relative;
}
.icon-btn svg { width: 22px; height: 22px; display: block; }
.icon-btn.del-all { border-color: rgba(248,113,113,0.35); }
.icon-btn.del-all svg { stroke: var(--danger); }
.icon-btn.bell-btn svg { stroke: var(--text2); }
.badge {
  position: absolute; top: 7px; left: 7px;
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--danger); border: 2px solid var(--app-bg);
}
.progress-bar { height: 4px; background: var(--surface3); margin: 0 18px 4px; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--success)); border-radius: 2px; transition: width .5s; }
.stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 10px 18px 14px; }
.stat { background: var(--surface); border-radius: var(--rs); padding: 14px 8px; border: 0.5px solid var(--border); text-align: center; }
.stat-n { font-size: 28px; font-weight: 700; display: block; line-height: 1.1; }
.stat-n.a { color: var(--accent2); }
.stat-n.s { color: var(--success); }
.stat-n.w { color: var(--warning); }
.stat-l { font-size: 12px; color: var(--text3); margin-top: 4px; display: block; }
.tabs { display: flex; gap: 6px; padding: 0 18px 14px; }
.tab {
  flex: 1; padding: 11px 4px; border-radius: 24px; border: none;
  background: transparent; color: var(--text3);
  font-size: 14px; font-family: 'Rubik', sans-serif; cursor: pointer;
}
.tab.on { background: var(--accent-glow); color: var(--accent2); border: 0.5px solid rgba(124,106,247,0.35); }
.list {
  flex: 1; padding: 0 18px;
  display: flex; flex-direction: column; gap: 12px;
  padding-bottom: calc(110px + var(--safe-bottom));
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
.card {
  background: var(--surface); border-radius: var(--r);
  padding: 16px 18px; border: 0.5px solid var(--border);
  display: flex; align-items: flex-start; gap: 14px;
  cursor: pointer; position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; right: 0; top: 0; bottom: 0;
  width: 4px; border-radius: 0 var(--r) var(--r) 0;
}
.card.ph::before { background: var(--danger); }
.card.pm::before { background: var(--warning); }
.card.pl::before { background: var(--success); }
.card.done { opacity: 0.5; }
.circle {
  width: 28px; height: 28px; min-width: 28px; border-radius: 50%;
  border: 2px solid var(--surface3);
  display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 2px;
}
.circle.on { background: var(--success); border-color: var(--success); }
.circle svg { width: 14px; height: 14px; display: none; }
.circle.on svg { display: block; }
.cbody { flex: 1; min-width: 0; }
.ctitle { font-size: 16px; font-weight: 500; line-height: 1.4; }
.done .ctitle { text-decoration: line-through; color: var(--text3); }
.meta { display: flex; gap: 8px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
.tag { font-size: 12px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }
.tag.work     { background: rgba(124,106,247,0.15); color: var(--accent2); }
.tag.personal { background: rgba(251,191,36,0.15);  color: var(--warning); }
.tag.health   { background: rgba(52,211,153,0.15);  color: var(--success); }
.tag.family   { background: rgba(248,113,113,0.15); color: var(--danger); }
.ctime { font-size: 12px; color: var(--text3); display: flex; align-items: center; gap: 4px; }
.ctime svg { width: 13px; height: 13px; stroke: var(--text3); }
.rbadge { font-size: 11px; background: rgba(124,106,247,0.15); color: var(--accent2); padding: 3px 9px; border-radius: 12px; border: 0.5px solid rgba(124,106,247,0.25); display: flex; align-items: center; gap: 4px; }
.rbadge svg { width: 11px; height: 11px; stroke: var(--accent2); }
.cnotes { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.5; }
.xactions { display: none; flex-direction: row; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); }
.card.exp .xactions { display: flex; }
.xbtn { flex: 1; padding: 9px 6px; border-radius: 10px; border: 0.5px solid var(--border); background: transparent; font-size: 13px; font-family: 'Rubik', sans-serif; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; gap: 5px; }
.xbtn svg { width: 14px; height: 14px; }
.xbtn.xd { color: var(--danger); border-color: rgba(248,113,113,0.25); }
.xbtn.xd svg { stroke: var(--danger); }
.xbtn.xr { color: var(--accent2); border-color: rgba(124,106,247,0.25); }
.xbtn.xr svg { stroke: var(--accent2); }
.fab {
  position: fixed; bottom: calc(28px + var(--safe-bottom)); left: 50%;
  transform: translateX(-50%);
  background: var(--accent); color: #fff; border: none;
  border-radius: 34px; padding: 17px 38px;
  font-size: 16px; font-family: 'Rubik', sans-serif; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 8px 32px rgba(124,106,247,.45); z-index: 20;
}
.fab svg { width: 20px; height: 20px; stroke: #fff; }
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.75);
  z-index: 30; display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.overlay.on { opacity: 1; pointer-events: all; }
.sheet {
  background: var(--surface); border-radius: 26px 26px 0 0;
  padding: 24px 20px calc(32px + var(--safe-bottom));
  width: 100%; max-width: 480px;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  border-top: 0.5px solid var(--border);
  max-height: 92vh; overflow-y: auto;
}
.overlay.on .sheet { transform: translateY(0); }
.handle { width: 44px; height: 5px; background: var(--surface3); border-radius: 3px; margin: 0 auto 22px; }
.stitle { font-size: 20px; font-weight: 700; margin-bottom: 22px; }
.fg { margin-bottom: 16px; }
.fl { font-size: 13px; color: var(--text2); margin-bottom: 7px; display: block; }
.fi, .fs, .fta {
  width: 100%; background: var(--surface2); border: 0.5px solid var(--border);
  border-radius: var(--rs); padding: 14px 16px;
  font-size: 16px; font-family: 'Rubik', sans-serif; color: var(--text1); outline: none; direction: rtl;
}
.fi:focus, .fs:focus, .fta:focus { border-color: rgba(124,106,247,.55); }
.fs { cursor: pointer; }
.fta { resize: none; height: 80px; line-height: 1.5; }
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
.prow { display: flex; gap: 8px; }
.pb {
  flex: 1; padding: 12px 6px; border-radius: 10px;
  border: 0.5px solid var(--border); background: transparent;
  font-size: 14px; font-family: 'Rubik', sans-serif; cursor: pointer; color: var(--text2);
}
.pb.sh { background: rgba(248,113,113,0.15); color: var(--danger);  border-color: rgba(248,113,113,0.35); }
.pb.sm { background: rgba(251,191,36,0.15);  color: var(--warning); border-color: rgba(251,191,36,0.35); }
.pb.sl { background: rgba(52,211,153,0.15);  color: var(--success); border-color: rgba(52,211,153,0.35); }
.trow { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: var(--rs); padding: 14px 16px; border: 0.5px solid var(--border); cursor: pointer; }
.tl { font-size: 15px; }
.ts { font-size: 12px; color: var(--text3); margin-top: 3px; }
.tsw { width: 52px; height: 28px; border-radius: 14px; background: var(--surface3); position: relative; transition: background .2s; border: none; flex-shrink: 0; }
.tsw.on { background: var(--accent); }
.tk { position: absolute; top: 4px; right: 4px; width: 20px; height: 20px; border-radius: 50%; background: #fff; transition: transform .2s; }
.tsw.on .tk { transform: translateX(-24px); }
.sbtn { width: 100%; background: var(--accent); color: #fff; border: none; border-radius: var(--rs); padding: 17px; font-size: 16px; font-weight: 600; font-family: 'Rubik', sans-serif; cursor: pointer; margin-top: 10px; }
.toast {
  position: fixed; top: calc(24px + var(--safe-top)); left: 50%;
  transform: translateX(-50%) translateY(-100px);
  background: var(--surface3); color: var(--text1);
  padding: 14px 22px; border-radius: 28px; font-size: 15px;
  z-index: 100; border: 0.5px solid var(--border);
  display: flex; align-items: center; gap: 9px;
  transition: transform .35s cubic-bezier(.34,1.56,.64,1);
  max-width: 90%; white-space: nowrap;
}
.toast.on { transform: translateX(-50%) translateY(0); }
.toast svg { width: 18px; height: 18px; stroke: var(--success); flex-shrink: 0; }
.empty { text-align: center; padding: 60px 20px; color: var(--text3); }
.empty svg { width: 52px; height: 52px; stroke: var(--text3); margin: 0 auto 16px; display: block; }
.empty p { font-size: 16px; line-height: 1.7; }
.sh2 { font-size: 12px; color: var(--text3); letter-spacing: .06em; padding: 4px 0 9px; }
.co {
  position: fixed; inset: 0; background: rgba(0,0,0,0.8);
  z-index: 40; display: flex; align-items: center; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .2s; padding: 24px;
}
.co.on { opacity: 1; pointer-events: all; }
.cbox {
  background: var(--surface); border-radius: 22px;
  padding: 32px 26px 26px; width: 100%; max-width: 340px;
  border: 0.5px solid rgba(248,113,113,0.25); text-align: center;
  transform: scale(.9); transition: transform .25s cubic-bezier(.34,1.56,.64,1);
}
.co.on .cbox { transform: scale(1); }
.cicon { width: 60px; height: 60px; border-radius: 50%; background: rgba(248,113,113,0.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 18px; }
.cicon svg { width: 28px; height: 28px; stroke: var(--danger); }
.ct { font-size: 19px; font-weight: 700; margin-bottom: 10px; }
.cs { font-size: 14px; color: var(--text2); line-height: 1.6; margin-bottom: 26px; }
.cbtns { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.btnc { background: var(--surface2); color: var(--text2); border: 0.5px solid var(--border); border-radius: var(--rs); padding: 14px; font-size: 15px; font-family: 'Rubik', sans-serif; cursor: pointer; }
.btnd { background: var(--danger); color: #fff; border: none; border-radius: var(--rs); padding: 14px; font-size: 15px; font-weight: 600; font-family: 'Rubik', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btnd svg { width: 16px; height: 16px; stroke: #fff; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div>
        <div class="greeting">המשימות שלי ✦</div>
        <div class="sub" id="lbl"></div>
      </div>
      <div class="header-actions">
        <div class="date-pill" id="dpill"></div>
        <div class="icon-btn del-all" onclick="openConfirm()" aria-label="נקה הכל">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6M14 11v6M9 6V4h6v2"/>
          </svg>
        </div>
        <div class="icon-btn bell-btn" onclick="testSound()" aria-label="בדוק צליל">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <div class="badge" id="badge" style="display:none"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>

  <div class="stats">
    <div class="stat"><span class="stat-n a" id="st">0</span><span class="stat-l">סה"כ</span></div>
    <div class="stat"><span class="stat-n s" id="sd">0</span><span class="stat-l">הושלמו</span></div>
    <div class="stat"><span class="stat-n w" id="su">0</span><span class="stat-l">דחופות</span></div>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="setTab('all',this)">הכל</button>
    <button class="tab" onclick="setTab('active',this)">פעילות</button>
    <button class="tab" onclick="setTab('done',this)">הושלמו</button>
    <button class="tab" onclick="setTab('urgent',this)">דחופות</button>
  </div>

  <div class="list" id="list"></div>
</div>

<button class="fab" onclick="openModal()">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  משימה חדשה
</button>

<div class="overlay" id="mo" onclick="bgClose(event,'mo')">
  <div class="sheet">
    <div class="handle"></div>
    <div class="stitle">משימה חדשה</div>
    <div class="fg"><label class="fl">כותרת המשימה *</label><input class="fi" id="it" placeholder="מה צריך לעשות?"/></div>
    <div class="fg"><label class="fl">הערות (אופציונלי)</label><textarea class="fta" id="in" placeholder="פרטים נוספים..."></textarea></div>
    <div class="pgrid">
      <div class="fg" style="margin:0"><label class="fl">תאריך</label><input class="fi" type="date" id="id"/></div>
      <div class="fg" style="margin:0"><label class="fl">שעה</label><input class="fi" type="time" id="ih"/></div>
    </div>
    <div class="fg"><label class="fl">קטגוריה</label>
      <select class="fs" id="ic">
        <option value="work">💼 עבודה</option>
        <option value="personal">⭐ אישי</option>
        <option value="health">🏃 בריאות</option>
        <option value="family">🏠 משפחה</option>
      </select>
    </div>
    <div class="fg"><label class="fl">עדיפות</label>
      <div class="prow">
        <button class="pb" id="ph" onclick="sp('high')">🔴 דחוף</button>
        <button class="pb" id="pm" onclick="sp('med')">🟡 בינוני</button>
        <button class="pb sl" id="pl" onclick="sp('low')">🟢 נמוך</button>
      </div>
    </div>
    <div class="fg">
      <div class="trow" onclick="tr()">
        <div><div class="tl">הפעל תזכורת עם צליל</div><div class="ts">התראה קולית בזמן המשימה</div></div>
        <div class="tsw" id="tsw"><div class="tk"></div></div>
      </div>
    </div>
    <button class="sbtn" onclick="addTask()">הוסף משימה</button>
  </div>
</div>

<div class="co" id="co" onclick="bgClose(event,'co')">
  <div class="cbox">
    <div class="cicon">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M9 6V4h6v2"/>
      </svg>
    </div>
    <div class="ct">לנקות את כל המשימות?</div>
    <div class="cs" id="csub"></div>
    <div class="cbtns">
      <button class="btnc" onclick="closeConfirm()">ביטול</button>
      <button class="btnd" onclick="clearAll()">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
        נקה הכל
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="tmsg"></span>
</div>

<script>
let tasks=[], tab='all', pri='low', rem=false, exp=null, ac=null;
const cats={work:'עבודה',personal:'אישי',health:'בריאות',family:'משפחה'};
const days=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const mos=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function ac_(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function beep(type){
  try{
    const c=ac_();if(c.state==='suspended')c.resume();
    const ns=type==='r'?[{f:880,t:0,d:.15},{f:0,t:.15,d:.05},{f:880,t:.2,d:.15},{f:0,t:.35,d:.05},{f:1174,t:.4,d:.3}]:[{f:660,t:0,d:.08}];
    ns.forEach(n=>{if(!n.f)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=n.f;const t=c.currentTime;g.gain.setValueAtTime(0,t+n.t);g.gain.linearRampToValueAtTime(.35,t+n.t+.01);g.gain.exponentialRampToValueAtTime(.001,t+n.t+n.d);o.start(t+n.t);o.stop(t+n.t+n.d+.05);});
  }catch(e){}
}
function testSound(){beep('r');toast('🔔 בדיקת צליל התראה');}

function init(){
  const n=new Date();
  document.getElementById('lbl').textContent=`יום ${days[n.getDay()]}, ${n.getDate()} ב${mos[n.getMonth()]}`;
  document.getElementById('dpill').textContent=`${n.getDate()}/${n.getMonth()+1}/${n.getFullYear()}`;
  const td=n.toISOString().slice(0,10);
  document.getElementById('id').value=td;
  document.getElementById('ih').value=n.toTimeString().slice(0,5);
  tasks=[
    {id:1,title:'לשלוח דוח שבועי למנהל',notes:'',date:td,time:'09:00',cat:'work',p:'high',done:false,rem:true},
    {id:2,title:'פגישת צוות פיתוח',notes:'לדון בספרינט הבא',date:td,time:'14:30',cat:'work',p:'high',done:false,rem:true},
    {id:3,title:'קנות מצרכים לשבת',notes:'חלב, לחם, ירקות',date:td,time:'18:00',cat:'personal',p:'med',done:false,rem:false},
    {id:4,title:'אימון כושר – 45 דקות',notes:'',date:td,time:'07:00',cat:'health',p:'med',done:true,rem:false},
    {id:5,title:'שיחה עם אמא',notes:'להתקשר אחרי 20:00',date:td,time:'20:00',cat:'family',p:'low',done:false,rem:true},
  ];
  render();
  if('Notification'in window)Notification.requestPermission();
  setInterval(()=>{
    const n=new Date(),td=n.toISOString().slice(0,10);
    const hm=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
    tasks.forEach(t=>{if(!t.done&&t.rem&&t.date===td&&t.time===hm){beep('r');toast('⏰ '+t.title);if(Notification.permission==='granted')try{new Notification('תזכורת',{body:t.title});}catch(e){};}});
  },30000);
}

const ck=`<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const cl=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
const bl=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`;
const bo=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.73 21a2 2 0 01-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0118 8"/><path d="M6.26 6.26A5.86 5.86 0 006 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 00-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const tr2=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>`;
const st2=`<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

function render(){
  let f;
  if(tab==='active')f=tasks.filter(t=>!t.done);
  else if(tab==='done')f=tasks.filter(t=>t.done);
  else if(tab==='urgent')f=tasks.filter(t=>t.p==='high');
  else f=tasks;
  const dn=tasks.filter(t=>t.done).length,tot=tasks.length,urg=tasks.filter(t=>t.p==='high').length;
  document.getElementById('st').textContent=tot;
  document.getElementById('sd').textContent=dn;
  document.getElementById('su').textContent=urg;
  document.getElementById('pbar').style.width=(tot>0?Math.round(dn/tot*100):0)+'%';
  document.getElementById('badge').style.display=tasks.filter(t=>!t.done&&t.rem).length>0?'block':'none';
  const el=document.getElementById('list');
  if(!f.length){
    const msg=tab==='urgent'?'אין משימות דחופות':!tasks.length?'הרשימה ריקה ומוכנה<br>להתחלה חדשה!':'אין משימות להצגה';
    el.innerHTML=`<div class="empty">${st2}<p>${msg}</p></div>`;return;
  }
  if(tab==='urgent'){
    const a=f.filter(t=>!t.done),d=f.filter(t=>t.done);
    let h='';
    if(a.length){h+=`<div class="sh2">🔴 פעילות</div>`;a.forEach(t=>h+=card(t));}
    if(d.length){h+=`<div class="sh2" style="margin-top:8px">✅ הושלמו</div>`;d.forEach(t=>h+=card(t));}
    el.innerHTML=h;return;
  }
  const u=f.filter(t=>t.p==='high'&&!t.done),r=f.filter(t=>!(t.p==='high'&&!t.done));
  let h='';
  if(u.length){h+=`<div class="sh2">🔴 דחופות</div>`;u.forEach(t=>h+=card(t));if(r.length)h+=`<div class="sh2" style="margin-top:8px">שאר המשימות</div>`;}
  r.forEach(t=>h+=card(t));
  el.innerHTML=h;
}

function card(t){
  const e=exp===t.id;
  return`<div class="card p${t.p[0]} ${t.done?'done':''} ${e?'exp':''}" onclick="xp(${t.id})">
    <div class="circle ${t.done?'on':''}" onclick="event.stopPropagation();td(${t.id})">${t.done?ck:''}</div>
    <div class="cbody">
      <div class="ctitle">${t.title}</div>
      <div class="meta">
        <span class="tag ${t.cat}">${cats[t.cat]}</span>
        ${t.time?`<span class="ctime">${cl}${t.time}</span>`:''}
        ${t.rem?`<span class="rbadge">${bl}תזכורת</span>`:''}
      </div>
      ${t.notes&&e?`<div class="cnotes">${t.notes}</div>`:''}
      <div class="xactions">
        <button class="xbtn xd" onclick="event.stopPropagation();del(${t.id})">${tr2}מחק</button>
        <button class="xbtn xr" onclick="event.stopPropagation();trem(${t.id})">${t.rem?bo:bl}${t.rem?'בטל תזכורת':'הוסף תזכורת'}</button>
      </div>
    </div>
  </div>`;
}

function xp(id){exp=exp===id?null:id;render();}
function td(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.done=!t.done;beep('t');render();toast(t.done?'✅ משימה הושלמה!':'↩️ משימה נפתחה מחדש');}
function del(id){tasks=tasks.filter(t=>t.id!==id);exp=null;render();toast('🗑️ משימה נמחקה');}
function trem(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.rem=!t.rem;render();toast(t.rem?'🔔 תזכורת הופעלה':'🔕 תזכורת בוטלה');}
function setTab(t,b){tab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');exp=null;render();}
function openConfirm(){if(!tasks.length){toast('אין משימות לנקות');return;}document.getElementById('csub').textContent=(tasks.length===1?'יש משימה אחת ברשימה.':'יש '+tasks.length+' משימות ברשימה.')+' פעולה זו לא ניתנת לביטול.';document.getElementById('co').classList.add('on');}
function closeConfirm(){document.getElementById('co').classList.remove('on');}
function clearAll(){const c=tasks.length;tasks=[];exp=null;closeConfirm();render();toast('🗑️ '+c+' משימות נמחקו');}
function openModal(){document.getElementById('mo').classList.add('on');setTimeout(()=>document.getElementById('it').focus(),300);sp('low');rem=false;document.getElementById('tsw').classList.remove('on');}
function closeModal(){document.getElementById('mo').classList.remove('on');document.getElementById('it').value='';document.getElementById('in').value='';}
function bgClose(e,id){if(e.target===document.getElementById(id)){id==='mo'?closeModal():closeConfirm();}}
function sp(p){pri=p;['high','med','low'].forEach(x=>{const m={high:'sh',med:'sm',low:'sl'};document.getElementById('p'+x[0]).className='pb'+(x===p?' '+m[x]:'');});}
function tr(){rem=!rem;document.getElementById('tsw').classList.toggle('on',rem);}
function addTask(){
  const title=document.getElementById('it').value.trim();
  if(!title){document.getElementById('it').focus();toast('⚠️ הכנס כותרת למשימה');return;}
  const t={id:Date.now(),title,notes:document.getElementById('in').value.trim(),date:document.getElementById('id').value,time:document.getElementById('ih').value,cat:document.getElementById('ic').value,p:pri,done:false,rem};
  tasks.unshift(t);closeModal();render();toast('✅ משימה נוספה!');
  if(rem&&t.date&&t.time){const d=new Date(t.date+'T'+t.time)-Date.now();if(d>0&&d<86400000)setTimeout(()=>{beep('r');toast('⏰ '+t.title);if(Notification.permission==='granted')try{new Notification('תזכורת',{body:t.title});}catch(e){};},d);}
}
let tt;
function toast(msg){const e=document.getElementById('toast');document.getElementById('tmsg').textContent=msg;e.classList.add('on');clearTimeout(tt);tt=setTimeout(()=>e.classList.remove('on'),2600);}
init();
</script>
</body>
</html>
