
<style>

.pri-btn.sel-low { background: rgba(52,211,153,0.15); color: var(--success); border-color: rgba(52,211,153,0.3); }
.reminder-toggle-row { display: flex; align-items: center; justify-content: space-between; background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; border: 0.5px solid var(--border); cursor: pointer; }

.confirm-box { background: var(--surface); border-radius: 20px; padding: 28px 24px 24px; width: 100%; max-width: 320px; border: 0.5px solid rgba(248,113,113,0.2); text-align: center; transform: scale(0.9); transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1); }
.confirm-overlay.open .confirm-box { transform: scale(1); }

.confirm-icon svg { width: 24px; height: 24px; stroke: var(--danger); }

</style>

<script>
let tasks = [], currentTab = 'all', selectedPriority = 'low', reminderOn = false, expandedId = null;
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playAlert(type) {
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    const notes = type === 'reminder'
      ? [{f:880,t:0,d:0.15},{f:0,t:0.15,d:0.05},{f:880,t:0.2,d:0.15},{f:0,t:0.35,d:0.05},{f:1174,t:0.4,d:0.3}]
      : [{f:660,t:0,d:0.1}];
    notes.forEach(n => {
      if (!n.f) return;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = n.f;
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(0, now+n.t);
      gain.gain.linearRampToValueAtTime(0.35, now+n.t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now+n.t+n.d);
      osc.start(now+n.t); osc.stop(now+n.t+n.d+0.05);
    });
  } catch(e) {}
}
function testSound() { playAlert('reminder'); showToast('🔔 בדיקת צליל התראה'); }

const catNames = {work:'עבודה',personal:'אישי',health:'בריאות',family:'משפחה'};
const days = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const months = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

function init() {
  const now = new Date();
  document.getElementById('today-label').textContent = `יום ${days[now.getDay()]}, ${now.getDate()} ב${months[now.getMonth()]}`;
  document.getElementById('date-pill').textContent = `${now.getDate()}/${now.getMonth()+1}/${now.getFullYear()}`;
  const today = now.toISOString().slice(0,10);
  document.getElementById('inp-date').value = today;
  document.getElementById('inp-time').value = now.toTimeString().slice(0,5);
  tasks = [
    {id:1,title:'לשלוח דוח שבועי למנהל',notes:'',date:today,time:'09:00',cat:'work',priority:'high',done:false,reminder:true},
    {id:2,title:'פגישת צוות פיתוח',notes:'לדון בספרינט הבא',date:today,time:'14:30',cat:'work',priority:'high',done:false,reminder:true},
    {id:3,title:'קנות מצרכים לשבת',notes:'חלב, לחם, ירקות',date:today,time:'18:00',cat:'personal',priority:'med',done:false,reminder:false},
    {id:4,title:'אימון כושר – 45 דקות',notes:'',date:today,time:'07:00',cat:'health',priority:'med',done:true,reminder:false},
    {id:5,title:'שיחה עם אמא',notes:'להתקשר אחרי 20:00',date:today,time:'20:00',cat:'family',priority:'low',done:false,reminder:true},
  ];
  render();
  if ('Notification' in window) Notification.requestPermission();
  setInterval(checkReminders, 30000);
}

function checkReminders() {
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const hm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  tasks.forEach(t => {
    if (!t.done && t.reminder && t.date===today && t.time===hm) {
      playAlert('reminder');
      showToast('⏰ תזכורת: '+t.title);
      if (Notification.permission==='granted') try { new Notification('תזכורת',{body:t.title}); } catch(e) {}
    }
  });
}

const svgCheck   = `<svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
const svgClock   = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`;
const svgBell    = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>`;
const svgBellOff = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13.73 21a2 2 0 01-3.46 0"/><path d="M18.63 13A17.89 17.89 0 0118 8"/><path d="M6.26 6.26A5.86 5.86 0 006 8c0 7-3 9-3 9h14"/><path d="M18 8a6 6 0 00-9.33-5"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
const svgTrash   = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>`;
const svgStar    = `<svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>`;

function render() {
  let filtered;
  if      (currentTab === 'active') filtered = tasks.filter(t => !t.done);
  else if (currentTab === 'done')   filtered = tasks.filter(t => t.done);
  else if (currentTab === 'urgent') filtered = tasks.filter(t => t.priority === 'high');
  else                              filtered = tasks;

  const done   = tasks.filter(t => t.done).length;
  const total  = tasks.length;
  const urgent = tasks.filter(t => t.priority === 'high').length;
  document.getElementById('stat-total').textContent  = total;
  document.getElementById('stat-done').textContent   = done;
  document.getElementById('stat-urgent').textContent = urgent;
  document.getElementById('progress-fill').style.width = (total > 0 ? Math.round((done/total)*100) : 0) + '%';
  document.getElementById('notif-badge').style.display = tasks.filter(t => !t.done && t.reminder).length > 0 ? 'block' : 'none';

  const list = document.getElementById('task-list');
  if (filtered.length === 0) {
    const msg = currentTab === 'urgent' ? 'אין משימות דחופות' : tasks.length === 0 ? 'הרשימה ריקה ומוכנה<br>להתחלה חדשה!' : 'אין משימות להצגה';
    list.innerHTML = `<div class="empty-state">${svgStar}<p>${msg}</p></div>`;
    return;
  }

  if (currentTab === 'urgent') {
    const active = filtered.filter(t => !t.done);
    const done_u = filtered.filter(t => t.done);
    let html = '';
    if (active.length > 0) {
      html += `<div class="section-header">🔴 פעילות</div>`;
      active.forEach(t => html += taskHTML(t));
    }
    if (done_u.length > 0) {
      html += `<div class="section-header" style="margin-top:8px">✅ הושלמו</div>`;
      done_u.forEach(t => html += taskHTML(t));
    }
    list.innerHTML = html;
    return;
  }

  const urg  = filtered.filter(t => t.priority === 'high' && !t.done);
  const rest = filtered.filter(t => !(t.priority === 'high' && !t.done));
  let html = '';
  if (urg.length > 0) {
    html += `<div class="section-header">🔴 דחופות</div>`;
    urg.forEach(t => html += taskHTML(t));
    if (rest.length > 0) html += `<div class="section-header" style="margin-top:8px">שאר המשימות</div>`;
  }
  rest.forEach(t => html += taskHTML(t));
  list.innerHTML = html;
}

function taskHTML(t) {
  const exp = expandedId === t.id;
  return `<div class="task-card priority-${t.priority} ${t.done?'done':''} ${exp?'expanded':''}" id="task-${t.id}" onclick="toggleExpand(${t.id})">
    <div class="check-circle ${t.done?'checked':''}" onclick="event.stopPropagation();toggleDone(${t.id})">${t.done?svgCheck:''}</div>
    <div class="task-body">
      <div class="task-title">${t.title}</div>
      <div class="task-meta">
        <span class="tag ${t.cat}">${catNames[t.cat]}</span>
        ${t.time?`<span class="task-time">${svgClock}${t.time}</span>`:''}
        ${t.reminder?`<span class="reminder-badge">${svgBell}תזכורת</span>`:''}
      </div>
      ${t.notes&&exp?`<div class="task-notes">${t.notes}</div>`:''}
      <div class="expanded-actions">
        <button class="action-mini del" onclick="event.stopPropagation();deleteTask(${t.id})">${svgTrash}מחק</button>
        <button class="action-mini remind" onclick="event.stopPropagation();toggleTaskReminder(${t.id})">${t.reminder?svgBellOff:svgBell}${t.reminder?'בטל תזכורת':'הוסף תזכורת'}</button>
      </div>
    </div>
  </div>`;
}

function toggleExpand(id) { expandedId = expandedId===id ? null : id; render(); }
function toggleDone(id) {
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.done = !t.done; playAlert('tap'); render();
  showToast(t.done ? '✅ משימה הושלמה!' : '↩️ משימה נפתחה מחדש');
}
function deleteTask(id) { tasks = tasks.filter(t=>t.id!==id); expandedId=null; render(); showToast('🗑️ משימה נמחקה'); }
function toggleTaskReminder(id) {
  const t = tasks.find(x=>x.id===id); if(!t) return;
  t.reminder = !t.reminder; render();
  showToast(t.reminder ? '🔔 תזכורת הופעלה' : '🔕 תזכורת בוטלה');
}
function setTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); expandedId=null; render();
}
function openConfirm() {
  if (tasks.length===0) { showToast('אין משימות לנקות'); return; }
  document.getElementById('confirm-sub-text').textContent = (tasks.length===1?'יש משימה אחת ברשימה.':'יש '+tasks.length+' משימות ברשימה.')+' פעולה זו לא ניתנת לביטול.';
  document.getElementById('confirm-overlay').classList.add('open');
}
function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('open'); }
function closeConfirmBg(e) { if(e.target===document.getElementById('confirm-overlay')) closeConfirm(); }
function clearAllTasks() { const c=tasks.length; tasks=[]; expandedId=null; closeConfirm(); render(); showToast('🗑️ '+c+' משימות נמחקו — הרשימה ריקה'); }
function openModal() {
  document.getElementById('modal-overlay').classList.add('open');
  document.getElementById('inp-title').focus();
  selPri('low'); reminderOn=false;
  document.getElementById('reminder-toggle').classList.remove('on');
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.getElementById('inp-title').value=''; document.getElementById('inp-notes').value='';
}
function closeOnBg(e) { if(e.target===document.getElementById('modal-overlay')) closeModal(); }
function selPri(p) {
  selectedPriority=p;
  ['high','med','low'].forEach(x=>{ document.getElementById('pri-'+x).className='pri-btn'+(x===p?' sel-'+x:''); });
}
function toggleReminder() { reminderOn=!reminderOn; document.getElementById('reminder-toggle').classList.toggle('on',reminderOn); }
function addTask() {
  const title=document.getElementById('inp-title').value.trim();
  if(!title) { document.getElementById('inp-title').focus(); showToast('⚠️ הכנס כותרת למשימה'); return; }
  const t={id:Date.now(),title,notes:document.getElementById('inp-notes').value.trim(),date:document.getElementById('inp-date').value,time:document.getElementById('inp-time').value,cat:document.getElementById('inp-cat').value,priority:selectedPriority,done:false,reminder:reminderOn};
  tasks.unshift(t); closeModal(); render(); showToast('✅ משימה נוספה!');
  if(reminderOn&&t.date&&t.time){
    const delay=new Date(t.date+'T'+t.time)-Date.now();
    if(delay>0&&delay<86400000){
      setTimeout(()=>{
        playAlert('reminder');
        showToast('⏰ '+t.title);
        if(Notification.permission==='granted') try{new Notification('תזכורת',{body:t.title});}catch(e){}
      },delay);
    }
  }
}
let toastTimer;
function showToast(msg) {
  const el=document.getElementById('toast'); document.getElementById('toast-msg').textContent=msg;
  el.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}
init();
</script>
